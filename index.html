<!DOCTYPE html>
<html>
<head>
<title>DevOps POC</title>
<h1>VERSION 2 - TEST SLOT </h1>
    
<style>

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #e0f7fa, #e6f0ff, #f3e8ff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.container {
    background: #ffffff;
    padding: 50px;
    border-radius: 20px;
    width: 420px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* Top strip */
.top-strip {
    height: 8px;
    border-radius: 10px;
    margin-bottom: 25px;
    background: linear-gradient(to right,
        #5fa8d3,
        #7fc8a9,
        #b8c0ff,
        #cdb4db
    );
}

/* Heading */
h1 {
    font-size: 28px;
    color: #2c3e50;
    margin-bottom: 10px;
}

/* Text */
p {
    font-size: 16px;
    color: #8C235B;
}

/* Badge */
.badge {
    display: inline-block;
    margin-top: 20px;
    padding: 8px 16px;
    border-radius: 20px;
    background: #eef6ff;
    color: #4a90e2;
    font-size: 14px;
}

</style>

</head>

<body>

<div class="container">

    <div class="top-strip"></div>

    <h1>DevOps POC</h1>
    <p>Congratulations</p>
    <p>Deployment Successful </p>

    <div class="badge">CI/CD Pipeline Working</div>

</div>

</body>
</html>
