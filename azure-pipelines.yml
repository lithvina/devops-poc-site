trigger:
- main

pool:
  name: devops-poc-SSA

stages:

# ✅ BUILD (NO ZIP)
- stage: Build
  jobs:
  - job: BuildWebsite
    steps:
    - checkout: self

    - task: ArchiveFiles@2
      inputs:
        rootFolderOrFile: $(Build.SourcesDirectory)
        includeRootFolder: false
        archiveType: zip
        archiveFile: $(Build.ArtifactStagingDirectory)/site.zip

    - publish: $(Build.ArtifactStagingDirectory)/site.zip
      artifact: website

# ✅ DEPLOY TO TEST SLOT
- stage: Deploy_Test
  dependsOn: Build

  jobs:
  - deployment: DeployWeb
    environment: test-env

    pool:
      name: devops-poc-SSA

    strategy:
      runOnce:
        deploy:
          steps:

          - download: current
            artifact: website

          - task: AzureWebApp@1
            inputs:
              azureSubscription: 'devops-poc'
              appName: 'poc-devops-webapp'
              slotName: 'test'
              package: $(Pipeline.Workspace)/website/site.zip
              deploymentMethod: zipDeploy

# ✅ DEPLOY TO PRODUCTION
- stage: Deploy_Prod
  dependsOn: Deploy_Test

  jobs:
  - deployment: DeployProd
    environment: prod-env

    strategy:
      runOnce:
        deploy:
          steps:

          - download: current
            artifact: website

          - task: AzureWebApp@1
            inputs:
              azureSubscription: 'devops-poc'
              appName: 'poc-devops-webapp'
              package: $(Pipeline.Workspace)/website/site.zip
              deploymentMethod: zipDeploy