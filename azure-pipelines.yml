trigger:
- main

pool:
  name: devops-poc-SSA

stages:

- stage: Build
  jobs:
  - job: BuildWebsite

    steps:
    - checkout: self

    - task: ArchiveFiles@2
      inputs:
        rootFolderOrFile: .
        includeRootFolder: false
        archiveType: zip
        archiveFile: $(Build.ArtifactStagingDirectory)/site.zip

    - publish: $(Build.ArtifactStagingDirectory)/site.zip
      artifact: website