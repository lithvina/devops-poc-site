trigger:
- main

pool:
  name: devops-poc-SSA

stages:

- stage: Build
  jobs:
  - job: BuildWebsite

    steps:
    - checkout: self

    - task: ArchiveFiles@2
      inputs:
        rootFolderOrFile: .
        includeRootFolder: false
        archiveType: zip
        archiveFile: $(Build.ArtifactStagingDirectory)/site.zip

    - publish: $(Build.ArtifactStagingDirectory)/site.zip
      artifact: website

- stage: Deploy_Test
  dependsOn: Build

  jobs:
  - deployment: DeployWeb

    environment: test-env

    pool:
      name: devops-poc-SSA

    strategy:
      runOnce:
        deploy:
          steps:

          - download: current
            artifact: website

          - task: AzureWebApp@1
            inputs:
              azureSubscription: 'devops-poc'
              appName: 'poc-devops-webapp'
              slotName: 'test'
              package: $(Pipeline.Workspace)/website/site.zip